<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="{{.Site.BaseURL}}/">
    <title>{{.Page.Envelope.title}} — {{.Site.Name}}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav>
        <a href="index/" class="logo">Fuego</a>
        <ul>
            <li><a href="docs/getting-started/">Start</a></li>
            <li><a href="tutorials/">Tutorials</a></li>
            <li><a href="docs/configuration/">Reference</a></li>
            <li><a href="docs/concepts/build-pipeline/">Concepts</a></li>
            <li><a href="tags/">Tags</a></li>
            <li><a href="https://github.com/FabioSol/fuego">GitHub</a></li>
        </ul>
    </nav>
</header>
<main>
{{block "content" .}}<div class="page">{{.Page.Content}}</div>{{end}}
</main>
<footer>
    <p>Built with Fuego — the format-agnostic static site engine.</p>
</footer>
</body>
</html>
