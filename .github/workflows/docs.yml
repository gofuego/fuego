name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Branch-based deploy: build the docs and push the output to the gh-pages branch,
# which fuego-studio serves (gated by GitHub permission). Needs write to push.
permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build docs site
        run: cd docs && go run . build --config config.prod.yaml

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          publish_branch: gh-pages
