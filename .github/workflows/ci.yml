name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Tests (race)
        run: go test ./... -race

      - name: Determinism (integration x3)
        run: go test -run TestIntegrationFixtures -count=3 .

  benchmark:
    # Informational only — numbers are tracked for trends, never gate merges.
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build benchmark
        run: go test -bench=Build -benchtime=3x -run='^$' .
