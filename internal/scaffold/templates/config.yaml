site:
  name: "{{.Name}}"
  base_url: ""

parsers:
  card:
    rules:
      - match: '^front:\s*(.+)$'
        emit:
          type: front
          content: "$1"
      - match: '^back:\s*(.+)$'
        emit:
          type: back
          content: "$1"

collections:
  cards:
    match: "cards/**"
    sort_by: "order"
    layout: "listing"
    path: "/cards"
    page_size: 2

dev:
  port: 8080
