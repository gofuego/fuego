site:
  name: "Trivia Site"

parsers:
  trivia:
    rules:
      - match: '^\?\s*(.+)$'
        emit:
          type: question
          content: "$1"
      - match: '^\[([A-Z])\]\s+(.+)$'
        emit:
          type: answer
          content: "$2"
          attributes:
            letter: "$1"
      - match: '^>\s*(.+)$'
        emit:
          type: hint
          content: "$1"
